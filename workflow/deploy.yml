name: Deploy to GitHub Pages

# 触发条件：当推送到 main 分支时自动执行
on:
  push:
    branches: ['main']

# 设置 GITHUB_TOKEN 的权限，允许写入 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发的部署，避免冲突
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # 1. 构建流程
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Vite 默认的打包输出目录

  # 2. 部署流程
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
